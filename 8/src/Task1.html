<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Пример стилизации</title>

<style>
/* Общие стили */
body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
}

/* Форматирование текста */
h1 {
    text-align: center;
    color: darkblue;
    text-transform: uppercase;
}

/* Стилизация абзацев */
p {
    font-size: 16px;
    line-height: 1.6;
    color: #333;
    background-color: #ffffff;
    padding: 10px;
    border-left: 5px solid blue;
}

/* Стилизация списков */
ul {
    background-color: #e6f2ff;
    padding: 15px;
    list-style-type: square;
}

li {
    margin: 5px 0;
}

/* Стилизация таблиц */
table {
    width: 80%;
    border-collapse: collapse;
    margin: 20px auto;
    background-color: white;
}

th, td {
    border: 1px solid #333;
    padding: 10px;
    text-align: center;
}

th {
    background-color: #4CAF50;
    color: white;
}

/* Размеры элементов */
.box {
    width: 300px;
    height: 150px;
    min-width: 200px;
    max-width: 400px;
    min-height: 100px;
    margin: 20px auto;
    padding: 20px;
    
    /* box-sizing */
    box-sizing: border-box;

    /* Фон */
    background-color: lightgray;
    background-image: url('../amogus.jpg');
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    background-attachment: scroll;
    background-origin: padding-box;
    background-clip: border-box;
    
    color: white;
    text-align: center;
}
</style>

</head>
<body>

<h1>Моя страница</h1>

<p>Это пример абзаца с применением CSS-стилей. Здесь настроен цвет, отступы и граница.</p>

<h2>Список</h2>
<ul>
    <li>Первый элемент</li>
    <li>Второй элемент</li>
    <li>Третий элемент</li>
</ul>

<h2>Таблица</h2>
<table>
    <tr>
        <th>Имя</th>
        <th>Возраст</th>
    </tr>
    <tr>
        <td>Анна</td>
        <td>22</td>
    </tr>
    <tr>
        <td>Иван</td>
        <td>25</td>
    </tr>
</table>

<div class="box">
    Блок с фоновым изображением
</div>

</body>
</html>
