<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Селекторы в CSS3</title>
<style>
span:only-of-type{
color: rgb(99, 33, 73);   /* зеленый цвет */
}
p:only-of-type{
color: rgb(155, 39, 149); /* красный цвет */
}
div:only-of-type{
color: rgb(161, 93, 93);    /* синий цвет */
}
</style>
</head>
<body>
<div>
Header
</div>
<p>Единственный параграф и <span>элемент спан</span></p> <div>
Footer </div>
</body></html>
