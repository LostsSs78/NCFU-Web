<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 6</title>
    <style>
        table {
            border-collapse: collapse;
        }
        td {
            border: 1px solid black;
            width: 40px;
            height: 40px;
        }
    </style>
</head>
<body>
    <table align="center">
        <tr>
            <td colspan="8" bgcolor="#00FFCC"></td>
        </tr>
        <tr>
            <td rowspan="6" bgcolor="#FFFFCC"></td>
            <td colspan="6" bgcolor="#00FFCC"></td>
            <td rowspan="6" bgcolor="#FFFFCC"></td>
        </tr>
        <tr>
            <td rowspan="4" bgcolor="#FFFFCC"></td>
            <td colspan="4" bgcolor="#00FFCC"></td>
            <td rowspan="4" bgcolor="#FFFFCC"></td>
        </tr>
        <tr>
            <td rowspan="2" bgcolor="#FFFFCC"></td>
            <td bgcolor="red"></td>
            <td bgcolor="blue"></td>
            <td rowspan="2" bgcolor="#FFFFCC"></td>
        </tr>
        <tr>
            <td bgcolor="#00FF00"></td>
            <td bgcolor="yellow"></td>
        </tr>
        <tr>
            <td colspan="4" bgcolor="#00FFCC"></td>
        </tr>
        <tr>
            <td colspan="6" bgcolor="#00FFCC"></td>
        </tr>
        <tr>
            <td colspan="8" bgcolor="#00FFCC"></td>
        </tr>
    </table>
</body>
</html>
